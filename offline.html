<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1923">
<title>EscolApp — Sin conexión</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, sans-serif;
  background: #0f1923; color: #e8edf4;
  height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 30px;
  gap: 16px;
}
.icon { font-size: 72px; }
.title { font-size: 22px; font-weight: 800; }
.sub { font-size: 14px; color: #8a9bb0; line-height: 1.6; max-width: 300px; }
.btn {
  margin-top: 8px; padding: 13px 28px;
  background: #3d9fff; color: white;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
}
.note {
  font-size: 12px; color: #4a5f78;
  max-width: 280px; line-height: 1.6;
}
</style>
</head>
<body>
  <div class="icon">🎒</div>
  <div class="title">Sin conexión</div>
  <div class="sub">EscolApp necesita internet para sincronizar. Tus tarjetas guardadas siguen disponibles.</div>
  <button class="btn" onclick="location.reload()">🔄 Intentar de nuevo</button>
  <button class="btn" style="background:#1a2535;border:1px solid rgba(255,255,255,0.1)"
    onclick="location.href='/'">📋 Abrir tablero local</button>
  <div class="note">Los datos guardados en tu dispositivo están disponibles aunque no haya internet.</div>
</body>
</html>
